apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: v1.11.1 
    helm:
      values: |
          defaultSettings:
            storageMinimalAvailablePercentage: 30
            storageOverprovisioningPercentage: 100 
            replicaSoftAntiAffinity: true
          persistence:
            defaultClass: false 
            defaultReplicaCount: 1
          preUpgradeChecker:
            jobEnabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true