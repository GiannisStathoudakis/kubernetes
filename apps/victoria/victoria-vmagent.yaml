apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-vmagent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-agent
    targetRevision: 0.36.0
  # 
    helm:
      values: |
        fullnameOverride: "vmagent"
        
        remoteWrite:
          - url: "http://victoria-metrics-server.victoria.svc.cluster.local:8428/api/v1/write"

        config:
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'kubernetes-services'
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                  action: replace
                  target_label: __address__
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: job

            # --- LONGHORN METRICS ---
            - job_name: 'longhorn'
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
                  action: keep
                  regex: longhorn-system;longhorn-backend
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: job
        
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: victoria
  syncPolicy:
    automated:
      prune: true
      selfHeal: true