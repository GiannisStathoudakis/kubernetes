apiVersion: v1
kind: Namespace
metadata:
  name: forgejo-runners
  labels:
    istio.io/dataplane-mode: ambient 
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner-sa
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-role
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-rolebinding
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: forgejo-runner-sa
roleRef:
  kind: Role
  name: forgejo-runner-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: external-secrets.io/v1 
kind: ExternalSecret
metadata:
  name: runner-token-sync
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: forgejo-runner-token
  data:
    - secretKey: token
      remoteRef:
        key: secret/forgejo
        property: runner-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  config.yaml: |
    runner:
      capacity: 5
      labels:
        # Standard rootless node image for actions
        - "ubuntu-latest:docker.io/gitea/runner-images:ubuntu-22.04"
        # The lightweight alpine approach we discussed
        - "alpine-base:docker.io/library/node:20-alpine" 
    container:
      network: ""
      kubernetes:
        namespace: "forgejo-runners"
        pod_template: |
          apiVersion: v1
          kind: Pod
          metadata:
            generateName: forgejo-job-
          spec:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 1000
            containers:
              - name: job
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
            volumes:
              - name: workspace
                emptyDir:
                  medium: Memory
                  sizeLimit: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner-controller
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      serviceAccountName: forgejo-runner-sa
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:3.4.1
          command: ["sh", "-c"]
          args:
            - |
              # 1. Register the runner dynamically
              forgejo-runner register \
                --no-interactive \
                --instance https://forgejo.lab.internal/ \
                --token $(cat /secrets/token) \
                --name k8s-ambient-runner \
                --labels ubuntu-latest,alpine-base
              
              # 2. Start the daemon
              forgejo-runner daemon
          volumeMounts:
            - name: config-volume
              mountPath: /config.yaml
              subPath: config.yaml
            - name: token-volume
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: forgejo-runner-config
        - name: token-volume
          secret:
            secretName: forgejo-runner-token