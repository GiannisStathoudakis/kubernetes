apiVersion: gateway.networking.k8s.io/v1alpha2 # Note: TCPRoute is currently v1alpha2 in most clusters
kind: TCPRoute
metadata:
  name: forgejo-ssh-route
  namespace: forgejo-system
spec:
  parentRefs:
  - name: lab-gateway
    namespace: istio-system
    sectionName: ssh 
  rules:
  - backendRefs:
    - name: forgejo-ssh
      port: 22