apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lab-gateway
  namespace: istio-system
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
spec:
  gatewayClassName: istio
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.lab.internal"
    tls:
      mode: Terminate
      certificateRefs:
      - name: lab-wildcard-tls
    allowedRoutes:
      namespaces:
        from: All