# -----------------------------
# Forgejo SSH Routing
# -----------------------------
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: forgejo-ssh-vs
  namespace: forgejo-system
spec:
  gateways:
  - istio-system/lab-gateway 
  tcp:
  - match:
    - port: 22
    route:
    - destination:
        host: forgejo-ssh.forgejo-system.svc.cluster.local
        port:
          number: 22