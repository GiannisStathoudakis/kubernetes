# -----------------------------
# Vault Routing
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
  - name: lab-gateway
    namespace: istio-system
  hostnames: ["vault.lab.internal"]
  rules:
  - backendRefs:
    - name: vault
      port: 8200
---
