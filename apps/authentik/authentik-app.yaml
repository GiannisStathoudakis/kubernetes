apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-helm-release
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.2.2
    helm:
      values: |
        global:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: secret_key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: postgresql-password
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: bootstrap_password

        postgresql:
          enabled: true
          primary:
            podAnnotations:
              istio.io/dataplane-mode: none
          auth:
            existingSecret: authentik-vault-secrets
            secretKeys:
              adminPasswordKey: postgresql-password
              userPasswordKey: postgresql-password
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true