apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-helm-release
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.2.2
    helm:
      values: |
        global:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: secret_key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: postgresql-password
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-vault-secrets
                  key: bootstrap_password
            - name: AUTHENTIK_POSTGRESQL__SSLMODE
              value: "disable"

        server:
          podAnnotations:
            sidecar.istio.io/rewriteAppHTTPProbers: "true"
        
        worker:
          podAnnotations:
            sidecar.istio.io/rewriteAppHTTPProbers: "true"

        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: 15-debian-11
          auth:
            existingSecret: authentik-vault-secrets
            secretKeys:
              adminPasswordKey: postgresql-password
              userPasswordKey: postgresql-password
          
          primary:
            service:
              ports:
                postgresql: 5432
              appProtocol: tcp
            podAnnotations:
              traffic.istio.io/excludeInboundPorts: "5432"
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true