apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://releases.rancher.com/server-charts/stable
    chart: rancher
    targetRevision: 2.13.3
    helm:
      kubeVersion: "1.34.9" 
      parameters:
        - name: hostname
          value: rancher.lab.internal
        - name: replicas
          value: "1"
        - name: ingress.enabled
          value: "false"
        - name: tls
          value: external
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true