apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runners
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  config.yaml: |
    runner:
      capacity: 5
      labels:
        - "ubuntu-latest:docker.io/gitea/runner-images:ubuntu-22.04"
        - "alpine-base:docker.io/library/node:20-alpine" 
    container:
      network: ""
      kubernetes:
        namespace: "forgejo-runners"
        pod_template: |
          apiVersion: v1
          kind: Pod
          metadata:
            generateName: forgejo-job-
          spec:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 1000
            containers:
              - name: job
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
            volumes:
              - name: workspace
                emptyDir:
                  medium: Memory
                  sizeLimit: 4Gi