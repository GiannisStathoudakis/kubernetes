apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: metallb
            path: apps/metallb
          - app: vault
            path: apps/vault
          - app: cert-manager
            path: apps/cert-manager

  template:
    metadata:
      name: '{{app}}-root'
    spec:
      project: default
      source:
        repoURL: git@github.com:GiannisStathoudakis/kubernetes.git 
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true