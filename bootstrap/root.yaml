apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: metallb
            path: apps/metallb
          - app: vault
            path: apps/vault
          - app: cert-manager
            path: apps/cert-manager
          - app: eso
            path: apps/external-secrets
          - app: istio
            path: apps/istio
          - app: argocd
            path: apps/argocd
          - app: rancher
            path: apps/rancher
          - app: longhorn
            path: apps/longhorn
          - app: grafana
            path: apps/grafana

  template:
    metadata:
      name: '{{app}}-root'
    spec:
      project: default
      source:
        repoURL: git@github.com:GiannisStathoudakis/kubernetes.git 
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true